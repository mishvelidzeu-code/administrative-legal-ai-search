<!doctype html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>რეგისტრაცია | precedenti.ge</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --navy: #0f172a;
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      --r-lg: 16px;
      --r-sm: 8px;
    }

    * {
      box-sizing: border-box;
      transition: all 0.2s ease-in-out;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    a {
      text-decoration: none;
      color: var(--primary);
      font-weight: 500;
    }

    a:hover {
      color: var(--primary-hover);
      text-decoration: underline;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 480px;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--navy);
      letter-spacing: -0.03em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .logo::before {
      content: '';
      display: inline-block;
      width: 12px;
      height: 12px;
      background: var(--primary);
      border-radius: 50%;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.88rem;
      margin-bottom: 8px;
      color: #334155;
    }

    .form-group input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      background: #fff;
      padding: 12px 16px;
      outline: none;
      color: var(--text);
      font-size: 1rem;
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .terms-line {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.88rem;
      margin-bottom: 24px;
      color: #475569;
      line-height: 1.4;
    }

    .terms-line input {
      accent-color: var(--primary);
      width: 16px;
      height: 16px;
      margin-top: 2px;
      cursor: pointer;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: var(--r-sm);
      padding: 14px;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .footer-text {
      text-align: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.92rem;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }

    /* 2026 legal-tech auth visual refresh: CSS-only */
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --border: #d9e0ea;
      --primary: #12335f;
      --primary-hover: #0b2445;
      --navy: #071a33;
      --gold: #b88a2e;
      --justice-image: url("https://upload.wikimedia.org/wikipedia/commons/2/2c/HK_Central_Statue_Square_Legislative_Council_Building_n_Themis_s.jpg");
      --shadow-lg: 0 24px 60px rgba(7, 26, 51, 0.14);
      --r-lg: 14px;
      --r-sm: 9px;
    }

    * {
      transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    body {
      background:
        linear-gradient(90deg, rgba(7, 26, 51, 0.96), rgba(18, 51, 95, 0.78)),
        var(--justice-image) right center / min(42vw, 520px) auto no-repeat,
        linear-gradient(180deg, #071a33 0%, #12335f 100%);
      letter-spacing: 0;
      display: flex;
      flex-direction: column;
      place-items: stretch;
      padding: 0;
    }

    .auth-topbar {
      width: 100%;
      background: linear-gradient(90deg, #071a33 0%, #12335f 100%);
      border-bottom: 3px solid var(--gold);
      box-shadow: 0 14px 34px rgba(7, 26, 51, 0.18);
      backdrop-filter: blur(12px);
    }

    .auth-topbar-inner {
      width: min(1280px, calc(100% - 48px));
      height: 76px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .auth-menu {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .auth-menu a {
      border-radius: 8px;
      padding: 10px 14px;
      color: rgba(255, 255, 255, 0.84);
      font-weight: 700;
      text-decoration: none;
    }

    .auth-menu a:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .auth-menu a.active {
      background: var(--gold);
      color: #071a33;
      box-shadow: 0 10px 22px rgba(184, 138, 46, 0.24);
    }

    .auth-page {
      width: 100%;
      flex: 1;
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }

    .auth-card {
      border: 1px solid #ccd6e3;
      border-top: 5px solid var(--gold);
      box-shadow: var(--shadow-lg);
      padding: 42px;
    }

    .logo {
      letter-spacing: 0;
      color: #fff;
      font-size: 1.28rem;
    }

    .logo::before {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      background: linear-gradient(135deg, var(--navy) 0%, #12335f 58%, var(--gold) 58%, var(--gold) 100%);
      box-shadow: 0 6px 16px rgba(18, 51, 95, 0.2);
    }

    h1 {
      color: var(--navy);
      letter-spacing: 0;
    }

    .form-group label {
      color: #25364d;
    }

    .form-group input {
      background: #fbfcfe;
      border-color: #d7dfea;
      border-radius: var(--r-sm);
      box-shadow: inset 0 1px 2px rgba(16, 24, 40, 0.03);
    }

    .form-group input:focus {
      background: #fff;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(18, 51, 95, 0.1);
    }

    .terms-line {
      color: #475467;
    }

    .btn {
      background: var(--primary);
      border-radius: var(--r-sm);
      box-shadow: 0 12px 24px rgba(18, 51, 95, 0.16);
    }

    .btn:hover {
      background: var(--primary-hover);
      box-shadow: 0 16px 32px rgba(18, 51, 95, 0.22);
    }

    a {
      color: var(--primary);
    }

    a:hover {
      color: var(--primary-hover);
    }

    @media (max-width: 640px) {
      .auth-topbar-inner {
        width: min(100% - 24px, 1280px);
        height: auto;
        padding: 14px 0;
        align-items: flex-start;
        flex-direction: column;
      }

      .auth-menu {
        width: 100%;
        justify-content: space-between;
      }

      body {
        background: linear-gradient(180deg, #071a33 0%, #12335f 100%);
      }

      .auth-card {
        padding: 30px 22px;
      }
    }

    .logo::before {
      content: '';
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      background: var(--gold);
      border-radius: 0;
      line-height: 1;
      box-shadow: none;
      transform: none;
      -webkit-mask: url("https://api.iconify.design/lucide/scale.svg") center / contain no-repeat;
      mask: url("https://api.iconify.design/lucide/scale.svg") center / contain no-repeat;
    }

    .auth-topbar {
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 3px solid var(--gold);
      box-shadow: 0 14px 34px rgba(7, 26, 51, 0.12);
    }

    .auth-topbar .logo {
      color: var(--navy);
    }

    .auth-menu a {
      color: #25364d;
    }

    .auth-menu a:hover {
      background: #f8fafc;
      color: var(--navy);
    }

    .auth-menu a.active {
      background: var(--navy);
      color: #fff;
      box-shadow: 0 10px 22px rgba(7, 26, 51, 0.16);
    }
  </style>
</head>
<body>

  <header class="auth-topbar">
    <div class="auth-topbar-inner">
      <a href="supreme-decisions.html" class="logo">precedenti.ge</a>
      <nav class="auth-menu" aria-label="მთავარი მენიუ">
        <a href="supreme-decisions.html">ძიება</a>
        <a href="register.html" class="active">რეგისტრაცია</a>
        <a href="login.html">შესვლა</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
  <div class="auth-card">
    <div class="header">
      <a href="supreme-decisions.html" class="logo">precedenti.ge</a>
      <h1>ანგარიშის შექმნა</h1>
      <p class="subtitle">შემოუერთდი პლატფორმას და გაიმარტივე მუშაობა</p>
    </div>

    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label>სახელი</label>
          <input type="text" id="firstname" placeholder="გიორგი" required>
        </div>
        <div class="form-group">
          <label>გვარი</label>
          <input type="text" id="lastname" placeholder="კაპანაძე" required>
        </div>
      </div>

      <div class="form-group">
        <label>ელ. ფოსტა</label>
        <input type="email" id="email" placeholder="name@example.com" required>
      </div>

      <div class="form-group">
        <label>პაროლი</label>
        <input type="password" id="password" placeholder="მინ. 6 სიმბოლო" minlength="6" required>
      </div>

      <div class="form-group">
        <label>გაიმეორეთ პაროლი</label>
        <input type="password" id="confirm-password" placeholder="••••••••" required>
      </div>

      <label class="terms-line">
        <input type="checkbox" id="terms" required>
        <span>ვადასტურებ, რომ ვეცანი და ვეთანხმები <a href="#">წესებსა და პირობებს</a> და <a href="#">კონფიდენციალურობის პოლიტიკას</a></span>
      </label>

      <button type="submit" class="btn">რეგისტრაცია</button>
    </form>

    <div class="footer-text">
      უკვე გაქვს ანგარიში? <a href="login.html">შესვლა</a>
    </div>
  </div>
  </main>

  <script src="supabase.umd.js"></script>
  <script src="supabase-client.js"></script>
  <script>
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.replace('supreme-decisions.html');
    });

    async function handleRegister(e) {
      e.preventDefault();
      const firstName = document.getElementById('firstname').value.trim();
      const lastName = document.getElementById('lastname').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPass = document.getElementById('confirm-password').value;
      const button = document.querySelector('#register-form button[type="submit"]');

      if (password !== confirmPass) {
        alert("პაროლები არ ემთხვევა ერთმანეთს!");
        return;
      }

      button.disabled = true;
      button.textContent = "რეგისტრაცია...";

      const { error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
          data: {
            first_name: firstName,
            last_name: lastName,
            full_name: `${firstName} ${lastName}`.trim()
          }
        }
      });

      button.disabled = false;
      button.textContent = "რეგისტრაცია";

      if (error) {
        alert(error.message);
        return;
      }

      alert("რეგისტრაცია წარმატებით გაიგზავნა. შეამოწმეთ ელ. ფოსტა დადასტურებისთვის.");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
